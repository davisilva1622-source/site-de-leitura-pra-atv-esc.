<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca do Luar</title>
  <link rel="stylesheet" href="lua.css">
</head>
<body>

<header>
  <h1>🌙 Biblioteca do Luar</h1>
  <p>Histórias que brilham sob a luz da lua</p>
</header>

<nav>
  <input type="text" id="pesquisa" placeholder="Pesquisar livro ou mangá...">
</nav>

<main>

  <section>
    <h2>📚 Livros</h2>

    <div class="catalogo">

      <article class="card">
        <h3>Dom Casmurro</h3>
        <p>Machado de Assis</p>
      </article>

      <article class="card">
        <h3>O Pequeno Príncipe</h3>
        <p>Antoine de Saint-Exupéry</p>
      </article>

      <article class="card">
        <h3>1984</h3>
        <p>George Orwell</p>
      </article>

    </div>
  </section>

  <section>
    <h2>📖 Mangás</h2>

    <div class="catalogo">

      <article class="card">
        <h3>Naruto</h3>
        <p>Masashi Kishimoto</p>
      </article>

      <article class="card">
        <h3>One Piece</h3>
        <p>Eiichiro Oda</p>
      </article>

      <article class="card">
        <h3>Attack on Titan</h3>
        <p>Hajime Isayama</p>
      </article>

    </div>
  </section>

</main>

<footer>
  <p>🌙 Biblioteca do Luar © 2026</p>
</footer>

<script src="sky.js"></script>

</body>
</html>
